    const Modal = ({ isOpen, title, onClose, children }) => {
      useEffect(() => {
        const handleEscape = (e) => {
          if (e.key === 'Escape') onClose();
        };
        if (isOpen) document.addEventListener('keydown', handleEscape);
        return () => document.removeEventListener('keydown', handleEscape);
      }, [isOpen, onClose]);

      if (!isOpen) return null;

      return (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" onClick={onClose}>
          <div className="bg-white rounded-lg shadow-xl max-w-2xl w-full mx-4" onClick={(e) => e.stopPropagation()}>
            <div className="flex items-center justify-between p-6 border-b border-gray-200">
              <h2 className="text-lg font-bold text-gray-900">{title}</h2>
              <button onClick={onClose} className="text-gray-400 hover:text-gray-600">
                <CloseIcon />
              </button>
            </div>
            <div className="p-6 max-h-96 overflow-y-auto">
              {children}
            </div>
          </div>
        </div>
      );
    };

      const matchesFilter = !searchFilter ||
        node.label.toLowerCase().includes(searchFilter.toLowerCase()) ||
        node.code.toLowerCase().includes(searchFilter.toLowerCase());

      if (!matchesFilter) return null;

      const hasVisibleChildren = node.children && node.children.some(child =>
        !searchFilter || child.label.toLowerCase().includes(searchFilter.toLowerCase()) ||
        child.code.toLowerCase().includes(searchFilter.toLowerCase())
      );

      return (
        <div className="text-sm">

              selected === node.id
                ? 'bg-blue-500 text-white'
                : 'hover:bg-gray-100 text-gray-700'
            }`}
            onClick={() => {
              onSelect(node.id);
              if (!isLeaf && hasVisibleChildren) {
                onToggle(node.id);
              }
            }}
          >
            {!isLeaf && hasVisibleChildren ? (
              <button
                onClick={(e) => {
                  e.stopPropagation();
                  onToggle(node.id);

                className="p-0 hover:bg-gray-200 rounded"

                    <tbody>
                      {asset.procedures.map((proc, idx) => (
                        <tr key={idx} className={idx % 2 === 0 ? 'bg-white' : 'bg-gray-50'}>
                          <td className="px-4 py-3 font-mono text-xs text-blue-600">{proc.code}</td>
                          <td className="px-4 py-3 text-gray-700">{proc.name}</td>
                          <td className="px-4 py-3 text-gray-600">{proc.frequency}</td>
                          <td className="px-4 py-3 text-gray-600">{proc.skill}</td>
                          <td className="px-4 py-3 text-gray-600">{proc.duration}</td>
                          <td className="px-4 py-3">
                            <span
                              className={`px-2 py-1 rounded text-xs font-medium ${
                                proc.priority === 'Critical'
                                  ? 'bg-red-100 text-red-700'
                                  : proc.priority === 'High'
                                  ? 'bg-orange-100 text-orange-700'
                                  : 'bg-green-100 text-green-700'
                              }`}
                            >
                              {proc.priority}
                            </span>
                          </td>
                          <td className="px-4 py-3 text-center">
                            <button onClick={() => onEditProcedure(assetId, idx)} className="p-1 text-blue-600 hover:bg-blue-50 rounded mr-1" title="Edit">
                              <PencilIcon />
                            </button>
                            <button onClick={() => onDeleteProcedure(assetId, idx)} className="p-1 text-red-600 hover:bg-red-50 rounded" title="Delete">
                              <TrashIcon />
                            </button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {activeTab === 'variants' && (
              <div className="space-y-4">
                <div className="flex justify-between items-center mb-4">
                  <h3 className="text-lg font-semibold text-gray-900">Country-Specific Overrides</h3>
                  <button onClick={() => onAddVariant(assetId)} className="flex items-center gap-2 bg-blue-600 text-white px-3 py-1.5 rounded text-sm hover:bg-blue-700">
                    <PlusIcon /> Add Country
                  </button>
                </div>
                <div className="overflow-x-auto border border-gray-200 rounded-lg">
                  <table className="w-full text-sm">
                    <thead className="bg-gray-100 border-b border-gray-200">
                      <tr>
                        <th className="px-4 py-2 text-left font-semibold text-gray-700">Country</th>
                        <th className="px-4 py-2 text-left font-semibold text-gray-700">Legislation Reference</th>
                        <th className="px-4 py-2 text-left font-semibold text-gray-700">Modified Frequency</th>
                        <th className="px-4 py-2 text-left font-semibold text-gray-700">Additional Requirements</th>
                        <th className="px-4 py-2 text-left font-semibold text-gray-700">Status</th>
                        <th className="px-4 py-2 text-center font-semibold text-gray-700">Actions</th>
                      </tr>
                    </thead>
                    <tbody>
                      {asset.variants.map((variant, idx) => (
                        <tr key={idx} className={idx % 2 === 0 ? 'bg-white' : 'bg-gray-50'}>
                          <td className="px-4 py-3 font-medium text-gray-700">{variant.country}</td>
                          <td className="px-4 py-3 text-gray-600 text-xs">{variant.legislation}</td>
                          <td className="px-4 py-3 text-gray-600">{variant.frequency}</td>
                          <td className="px-4 py-3 text-gray-600 text-xs">{variant.requirements}</td>
                          <td className="px-4 py-3">
                            <span
                              className={`px-2 py-1 rounded text-xs font-medium ${
                                variant.status === 'Validated'
                                  ? 'bg-green-100 text-green-700'
                                  : 'bg-amber-100 text-amber-700'
                              }`}
                            >
                              {variant.status}
                            </span>
                          </td>
                          <td className="px-4 py-3 text-center">
                            <button onClick={() => onEditVariant(assetId, idx)} className="p-1 text-blue-600 hover:bg-blue-50 rounded mr-1" title="Edit">
                              <PencilIcon />
                            </button>
                            <button onClick={() => onDeleteVariant(assetId, idx)} className="p-1 text-red-600 hover:bg-red-50 rounded" title="Delete">
                              <TrashIcon />
                            </button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    // Main Component
    function AssetTaxonomyBrowser() {
      const [expandedNodes, setExpandedNodes] = useState(new Set(['root', '5']));
      const [selectedNode, setSelectedNode] = useState(null);
      const [searchFilter, setSearchFilter] = useState('');
      const [activeTab, setActiveTab] = useState('details');
      const [assetDetails, setAssetDetails] = useState(initialAssetDetails);
      const [treeData, setTreeData] = useState({
        id: 'root',
        label: 'NRM3 Asset Taxonomy',
        children: [
          { id: '0', code: '0', label: 'Facilitating Works', assetCount: 12, children: [] },
          { id: '1', code: '1', label: 'Substructure', assetCount: 8, children: [] },
          { id: '2', code: '2', label: 'Superstructure', assetCount: 24, children: [] },
          { id: '3', code: '3', label: 'Internal Finishes', assetCount: 15, children: [] },
          { id: '4', code: '4', label: 'Fittings & Furnishings', assetCount: 18, children: [] },
          {
            id: '5',
            code: '5',
            label: 'Services',
            assetCount: 156,
            children: [
              { id: '5.1', code: '5.1', label: 'Sanitary Installations', assetCount: 22, children: [] },
              {
                id: '5.2',
                code: '5.2',
                label: 'Mechanical',
                assetCount: 48,
                children: [
                  { id: '5.2.1', code: '5.2.1', label: 'AHU - Air Handling Unit', assetCount: 1, children: [] },
                  { id: '5.2.2', code: '5.2.2', label: 'FCU - Fan Coil Unit', assetCount: 1, children: [] },
                  { id: '5.2.3', code: '5.2.3', label: 'Chiller', assetCount: 1, children: [] },
                  { id: '5.2.4', code: '5.2.4', label: 'Boiler', assetCount: 1, children: [] }
                ]
              },
              {
                id: '5.3',
                code: '5.3',
                label: 'Electrical',
                assetCount: 35,
                children: [
                  { id: '5.3.1', code: '5.3.1', label: 'Main Distribution Board', assetCount: 1, children: [] },
                  { id: '5.3.2', code: '5.3.2', label: 'UPS System', assetCount: 1, children: [] },
                  { id: '5.3.3', code: '5.3.3', label: 'Emergency Lighting', assetCount: 1, children: [] }
                ]
              },
              {
                id: '5.4',
                code: '5.4',
                label: 'Lift & Conveyor',
                assetCount: 8,
                children: [
                  { id: '5.4.1', code: '5.4.1', label: 'Passenger Lift', assetCount: 1, children: [] }
                ]
              },
              {
                id: '5.5',
                code: '5.5',
                label: 'Fire',
                assetCount: 18,
                children: [
                  { id: '5.5.1', code: '5.5.1', label: 'Fire Alarm Panel', assetCount: 1, children: [] },
                  { id: '5.5.2', code: '5.5.2', label: 'Sprinkler System', assetCount: 1, children: [] }
                ]
              },
              { id: '5.6', code: '5.6', label: 'Communication', assetCount: 12, children: [] },
              {
                id: '5.7',
                code: '5.7',
                label: 'Building Management',
                assetCount: 10,
                children: [
                  { id: '5.7.1', code: '5.7.1', label: 'BMS Controller', assetCount: 1, children: [] }
                ]
              },
              {
                id: '5.8',
                code: '5.8',
                label: 'Security',
                assetCount: 3,
                children: [
                  { id: '5.8.1', code: '5.8.1', label: 'CCTV System', assetCount: 1, children: [] },
                  { id: '5.8.2', code: '5.8.2', label: 'Access Control', assetCount: 1, children: [] }
                ]
              }
            ]
          },
          { id: '6', code: '6', label: 'Prefabricated Buildings', assetCount: 5, children: [] },
          { id: '7', code: '7', label: 'Work to Existing Buildings', assetCount: 9, children: [] },
          { id: '8', code: '8', label: 'External Works', assetCount: 31, children: [] }
        ]
      });

      // Modal States
      const [showAssetModal, setShowAssetModal] = useState(false);
      const [editingAssetId, setEditingAssetId] = useState(null);
      const [showProcedureModal, setShowProcedureModal] = useState(false);
      const [editingProcedureIdx, setEditingProcedureIdx] = useState(null);
      const [currentAssetForProcedure, setCurrentAssetForProcedure] = useState(null);
      const [showVariantModal, setShowVariantModal] = useState(false);
      const [editingVariantIdx, setEditingVariantIdx] = useState(null);
      const [currentAssetForVariant, setCurrentAssetForVariant] = useState(null);
      const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);
      const [deleteTarget, setDeleteTarget] = useState(null);

      const handleToggle = (nodeId) => {
        const newExpanded = new Set(expandedNodes);
        if (newExpanded.has(nodeId)) {
          newExpanded.delete(nodeId);
        } else {
          newExpanded.add(nodeId);
        }
        setExpandedNodes(newExpanded);
      };

      const handleSelect = (nodeId) => {
        if (assetDetails[nodeId]) {
          setSelectedNode(nodeId);
          setActiveTab('details');
        }
      };

      const handleAddAsset = () => {
        setEditingAssetId(null);
        setShowAssetModal(true);
      };

      const handleEditAsset = (assetId) => {
        setEditingAssetId(assetId);
        setShowAssetModal(true);
      };

      const handleSaveAsset = (formData) => {
        if (editingAssetId) {
          setAssetDetails(prev => ({
            ...prev,
            [editingAssetId]: {
              ...prev[editingAssetId],
              ...formData
            }
          }));
        } else {
          const nrmPath = formData.parentCategory ? [formData.parentCategory] : [];
          setAssetDetails(prev => ({
            ...prev,
            [formData.code]: {
              name: formData.name,
              description: formData.description,
              nrmPath: nrmPath,
              criticality: formData.criticality,
              conditionGrade: formData.conditionGrade,
              lifespan: formData.lifespan,
              replacementCost: formData.replacementCost,
              facilities: formData.facilities,
              procedures: [],
              variants: []
            }
          }));
          setSelectedNode(formData.code);
        }
        setShowAssetModal(false);
      };

      const handleDeleteAsset = (assetId) => {
        setDeleteTarget({ type: 'asset', id: assetId });
        setShowDeleteConfirm(true);
      };

      const confirmDeleteAsset = (assetId) => {
        setAssetDetails(prev => {
          const newDetails = { ...prev };
          delete newDetails[assetId];
          return newDetails;
        });
        setSelectedNode(null);
        setShowDeleteConfirm(false);
      };

      const handleAddProcedure = (assetId) => {
        setCurrentAssetForProcedure(assetId);
        setEditingProcedureIdx(null);
        setShowProcedureModal(true);
      };

      const handleEditProcedure = (assetId, idx) => {
        setCurrentAssetForProcedure(assetId);
        setEditingProcedureIdx(idx);
        setShowProcedureModal(true);
      };

      const handleSaveProcedure = (formData) => {
        setAssetDetails(prev => ({
          ...prev,
          [currentAssetForProcedure]: {
            ...prev[currentAssetForProcedure],
            procedures: editingProcedureIdx !== null
              ? prev[currentAssetForProcedure].procedures.map((p, i) =>
                  i === editingProcedureIdx ? formData : p
                )
              : [...prev[currentAssetForProcedure].procedures, formData]
          }
        }));
        setShowProcedureModal(false);
        setEditingProcedureIdx(null);
      };

      const handleDeleteProcedure = (assetId, idx) => {
        setDeleteTarget({ type: 'procedure', assetId, idx });
        setShowDeleteConfirm(true);
      };

      const confirmDeleteProcedure = (assetId, idx) => {
        setAssetDetails(prev => ({
          ...prev,
          [assetId]: {
            ...prev[assetId],
            procedures: prev[assetId].procedures.filter((_, i) => i !== idx)
          }
        }));
        setShowDeleteConfirm(false);
      };

      const handleAddVariant = (assetId) => {
        setCurrentAssetForVariant(assetId);
        setEditingVariantIdx(null);
        setShowVariantModal(true);
      };

      const handleEditVariant = (assetId, idx) => {
        setCurrentAssetForVariant(assetId);
        setEditingVariantIdx(idx);
        setShowVariantModal(true);
      };

      const handleSaveVariant = (formData) => {
        setAssetDetails(prev => ({
          ...prev,
          [currentAssetForVariant]: {
            ...prev[currentAssetForVariant],
            variants: editingVariantIdx !== null
              ? prev[currentAssetForVariant].variants.map((v, i) =>
                  i === editingVariantIdx ? formData : v
                )
              : [...prev[currentAssetForVariant].variants, formData]
          }
        }));
        setShowVariantModal(false);
        setEditingVariantIdx(null);
      };

      const handleDeleteVariant = (assetId, idx) => {
        setDeleteTarget({ type: 'variant', assetId, idx });
        setShowDeleteConfirm(true);
      };

      const confirmDeleteVariant = (assetId, idx) => {
        setAssetDetails(prev => ({
          ...prev,
          [assetId]: {
            ...prev[assetId],
            variants: prev[assetId].variants.filter((_, i) => i !== idx)
          }
        }));
        setShowDeleteConfirm(false);
      };

      const getParentCategories = () => {
        const categories = [];
        const traverse = (node) => {
          if (node.children && node.children.length > 0 && !Object.keys(assetDetails).some(key => assetDetails[key] && key === node.id)) {
            categories.push(`${node.code}-${node.label}`);
            node.children.forEach(traverse);
          }
        };
        treeData.children.forEach(traverse);
        return categories;
      };

      return (
        <div className="h-screen w-full bg-gray-50 flex">
          {/* Left Panel - Taxonomy Tree */}
          <div className="bg-white border-r border-gray-200 flex flex-col" style={{width:'30%'}}>
            {/* Header */}
            <div className="p-4 border-b border-gray-200 bg-gradient-to-r from-blue-600 to-blue-700">
              <h1 className="text-lg font-bold text-white mb-3">MyFM Asset Manager</h1>
              <button
                onClick={handleAddAsset}
                className="w-full flex items-center justify-center gap-2 bg-white text-blue-600 px-3 py-2 rounded-lg mb-3 hover:bg-gray-50 font-medium text-sm"
              >
                <PlusIcon /> Add Asset
              </button>
              {/* Search */}
              <div className="flex items-center gap-2 bg-white rounded-lg px-3 py-2">
                <SearchIcon />
                <input
                  type="text"
                  placeholder="Search taxonomy..."
                  value={searchFilter}
                  onChange={(e) => setSearchFilter(e.target.value)}
                  className="flex-1 bg-transparent outline-none text-sm"
                />
              </div>
            </div>

            {/* Tree */}
            <div className="flex-1 overflow-y-auto p-3">
              {treeData.children.map(node => (
                <TreeNode
                  key={node.id}
                  node={node}
                  expanded={expandedNodes.has(node.id)}
                  onToggle={handleToggle}
                  selected={selectedNode}
                  onSelect={handleSelect}
                  searchFilter={searchFilter}
                />
              ))}
            </div>

            {/* Footer Stats */}
            <div className="p-4 border-t border-gray-200 bg-gray-50">
              <div className="text-xs text-gray-600">
                <p>Total Assets: <span className="font-bold text-gray-900">{Object.keys(assetDetails).length}</span></p>
                <p>Selected: {selectedNode ? <span className="font-bold text-blue-600">{selectedNode}</span> : <span className="text-gray-500">None</span>}</p>
              </div>
            </div>
          </div>

          {/* Right Panel - Asset Details */}
          <div className="flex-1 flex flex-col">
            {/* Header */}
            <div className="bg-gradient-to-r from-blue-50 to-blue-100 border-b border-gray-200 px-6 py-4">
              <h2 className="text-xl font-bold text-gray-900">Asset Details & Procedures</h2>
              <p className="text-sm text-gray-600 mt-1">Manage NRM3 assets and linked SFG20 procedures</p>
            </div>

            {/* Content */}
            <div className="flex-1">
              <AssetDetailsPanel
                assetId={selectedNode}
                assetDetails={assetDetails}
                activeTab={activeTab}
                setActiveTab={setActiveTab}
                onEditAsset={handleEditAsset}
                onDeleteAsset={handleDeleteAsset}
                onAddProcedure={handleAddProcedure}
                onEditProcedure={handleEditProcedure}
                onDeleteProcedure={handleDeleteProcedure}
                onAddVariant={handleAddVariant}
                onEditVariant={handleEditVariant}
                onDeleteVariant={handleDeleteVariant}
              />
            </div>
          </div>

          {/* Modals */}
          <Modal isOpen={showAssetModal} title={editingAssetId ? "Edit Asset" : "Create New Asset"} onClose={() => setShowAssetModal(false)}>
            <AssetForm
              initialData={editingAssetId ? { code: editingAssetId, ...assetDetails[editingAssetId] } : null}
              parentCategories={getParentCategories()}
              onSave={handleSaveAsset}
              onCancel={() => setShowAssetModal(false)}
              isEdit={!!editingAssetId}
            />
          </Modal>

          <Modal isOpen={showProcedureModal} title={editingProcedureIdx !== null ? "Edit Procedure" : "Add Procedure"} onClose={() => setShowProcedureModal(false)}>
            <ProcedureForm
              initialData={editingProcedureIdx !== null ? assetDetails[currentAssetForProcedure].procedures[editingProcedureIdx] : null}
              onSave={handleSaveProcedure}
              onCancel={() => setShowProcedureModal(false)}
              isEdit={editingProcedureIdx !== null}
            />
          </Modal>

          <Modal isOpen={showVariantModal} title={editingVariantIdx !== null ? "Edit Country Variant" : "Add Country Variant"} onClose={() => setShowVariantModal(false)}>
            <CountryVariantForm
              initialData={editingVariantIdx !== null ? assetDetails[currentAssetForVariant].variants[editingVariantIdx] : null}
              onSave={handleSaveVariant}
              onCancel={() => setShowVariantModal(false)}
              isEdit={editingVariantIdx !== null}
            />
          </Modal>

          <ConfirmDialog
            isOpen={showDeleteConfirm}
            title="Confirm Delete"
            message={
              deleteTarget?.type === 'asset'
                ? `Are you sure you want to delete ${assetDetails[deleteTarget.id]?.name}?`
                : deleteTarget?.type === 'procedure'
                ? `Are you sure you want to delete this procedure?`
                : `Are you sure you want to delete this country variant?`
            }
            onConfirm={() => {
              if (deleteTarget.type === 'asset') {
                confirmDeleteAsset(deleteTarget.id);
              } else if (deleteTarget.type === 'procedure') {
                confirmDeleteProcedure(deleteTarget.assetId, deleteTarget.idx);
              } else if (deleteTarget.type === 'variant') {
                confirmDeleteVariant(deleteTarget.assetId, deleteTarget.idx);
              }
            }}
            onCancel={() => setShowDeleteConfirm(false)}
          />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AssetTaxonomyBrowser />);
  </script>
</body>
</html>
